id: agent-tester
kind: a2a-specialist-harness
version: 0.1.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
entrypoint: ./entrypoint.md
role_card: ./role.md
agent_card: ./agent-card.json
source_map: ./source-map.md
workflow: ./workflow.md
tool_policy: ./tool-policy.md
rubric: ./rubric.md
eval_plan: ./eval-plan.md
run_record_template: ./run-record.template.json
release_rollback: ./release-rollback.md
health_snapshot: ./health-snapshot.md
knowledge_base: ./knowledge-base
codex_wrapper: ../../.agents/skills/agent-tester/SKILL.md
hermes_skill: ../../.hermes/skills/agent-tester.md
hermes_package: ../../.hermes/agents/agent-tester
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/agent-tester
  model_policy: strong-agent-evaluation-with-current-best-practice-refresh
  status: draft-ready
  run_records_required:
    R0: false
    R1: true
    R2: true
    R3: true
    R4: true
activation:
  accepts_payloads:
    - taskBrief
    - handoffPacket
    - decisionRecord
  emits_payloads:
    - specialistReport
    - reviewFinding
    - handoffPacket
context:
  always_read:
    - ../../protocol/interaction-protocol.md
    - ./entrypoint.md
    - ./role.md
    - ./source-map.md
    - ./workflow.md
    - ./tool-policy.md
  task_scoped_reading: true
  what_to_read_policy: core-harness-target-contract-and-task-brief-first
  context_economy:
    progressive_disclosure_required: true
    whole_target_repo_required_reads_allowed: false
    knowledge_base_default_read_allowed: false
    harness_owned_procedure_required: true
  conditional_read:
    self_review_or_judge_output:
      - ./rubric.md
    eval_or_regression_output:
      - ./eval-plan.md
    target_runtime_surface_check:
      - target Codex or Hermes wrappers in scope
      - selected pack route that discovers the target agent
    knowledge_base_learning:
      - ./knowledge-base/README.md
      - ./knowledge-base/agent-testing-lessons.md
    external_best_practice_refresh:
      - ./knowledge-base/external-best-practices.md
    run_record_or_trace_review:
      - ./run-record.template.json
    release_or_promotion_review:
      - ./release-rollback.md
      - ./health-snapshot.md
  freshness_triggers:
    - user asks for latest or current agent testing practice
    - tested agent uses external runtime or framework guidance
    - safety guardrail or tool permission behavior is material
    - prompt injection excessive agency observability or eval guidance may have changed
    - prior lesson is older than the relevant framework or security guidance
boot_probe:
  commands:
    - git status --short
    - find agents -maxdepth 2 -name agent-card.json -o -name harness.yaml
    - find .agents .hermes -maxdepth 4 -type f
automation_packs:
  best_practice_refresh: ./workflow.md#best-practice-refresh-pack
  static_harness_review: ./workflow.md#1-static-harness-review
  deterministic_validation: ./workflow.md#2-deterministic-validation
  scenario_testing: ./workflow.md#3-scenario-testing
  exploratory_testing: ./workflow.md#4-exploratory-testing
  adversarial_testing: ./workflow.md#5-adversarial-testing
  trace_review: ./workflow.md#6-trace-and-path-review
  learning_loop: ./workflow.md#7-learning-loop
  critical_remediation_handoff: ./workflow.md#critical-remediation-handoff
quality_gates:
  - test charter is tied to the target agent role harness wrappers and task brief
  - current best practices are refreshed and cited when freshness matters
  - workflow path tool calls approvals handoffs and traces are checked when available
  - every confirmed finding has evidence impact recommendation confidence and owner
  - every recommendation and improvement-backlog item is mirrored into the target project TODO artifact or blocked with exact entries to add
  - critical existing-agent tuning findings emit agent-tuner handoff packets with evidence severity affected surfaces remediation intent and verification needed
  - creation packaging or net-new ownership findings route to agent-architect-crew-builder and protocol or shared governance findings route to protocol-steward
  - knowledge-base lessons are sanitized evidence-backed and paired with regression candidates
  - tester does not fix or tune the target agent unless explicitly reassigned
release_blockers:
  - uncited_current_best_practice_claim
  - critical_finding_without_correct_specialist_handoff
  - recommendation_without_project_todo_update
  - private_target_data_written_to_knowledge_base
  - tester_changed_target_agent_without_assignment
  - verified_claim_without_evidence
  - tainted_content_changed_instructions_or_policy
handoff:
  final_artifact_kind: specialistReport
  next_specialist_field: handoff.nextSpecialist
  existing_agent_tuning_next_specialist: agent-tuner
  creation_or_packaging_next_specialist: agent-architect-crew-builder
  protocol_or_governance_next_specialist: protocol-steward
  critical_handoff_required_fields:
    - evidence
    - severity
    - affectedSurfaces
    - remediationIntent
    - verificationNeeded
