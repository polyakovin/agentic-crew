id: playdate-platform-sdk
kind: a2a-specialist-harness
version: 0.1.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
role_card: ./role.md
agent_card: ./agent-card.json
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/playdate-platform-sdk
  model_policy: strong-platform-review-with-sdk-doc-awareness
activation:
  accepts_payloads:
    - taskBrief
    - handoffPacket
  emits_payloads:
    - specialistReport
    - reviewFinding
    - handoffPacket
context:
  always_read:
    - ../../protocol/interaction-protocol.md
    - ./role.md
  task_scoped_reading: true
  what_to_read_policy: playdate-docs-project-pitfalls-and-affected-api-files-only
quality_gates:
  - no Playdate API claim without source or local evidence
  - simulator evidence is not treated as device proof
  - rendering input datastore audio and per-frame performance risks are checked when in scope
handoff:
  final_artifact_kind: specialistReport
  next_specialist_field: handoff.nextSpecialist
