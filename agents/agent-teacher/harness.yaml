id: agent-teacher
kind: a2a-specialist-harness
version: 0.1.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
entrypoint: ./entrypoint.md
role_card: ./role.md
agent_card: ./agent-card.json
source_map: ./source-map.md
workflow: ./workflow.md
tool_policy: ./tool-policy.md
rubric: ./rubric.md
eval_plan: ./eval-plan.md
run_record_template: ./run-record.template.json
release_rollback: ./release-rollback.md
health_snapshot: ./health-snapshot.md
codex_wrapper: ../../.agents/skills/agent-teacher/SKILL.md
hermes_skill: ../../.hermes/skills/agent-teacher.md
hermes_package: ../../.hermes/agents/agent-teacher
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/agent-teacher
  model_policy: strong-history-analysis-with-domain-best-practice-refresh
  status: draft-ready
  run_records_required:
    R0: false
    R1: true
    R2: true
    R3: true
    R4: true
  limits:
    max_target_agents_per_run: 2
    max_history_windows_per_run: 5
    max_external_sources_without_approval: 8
    max_learning_artifacts_without_human_review: 6
    max_retry_attempts: 1
activation:
  accepts_payloads:
    - taskBrief
    - specialistReport
    - reviewFinding
    - decisionRecord
    - handoffPacket
  emits_payloads:
    - specialistReport
    - reviewFinding
    - decisionRecord
    - handoffPacket
context:
  always_read:
    - ./source-map.md
    - ./workflow.md
    - ./tool-policy.md
    - ./role.md
  read_budget:
    default_mode: target-agent-history-first
    intake_ladder:
      R0_boot:
        goal: classify target agent, learning objective, write scope, and stop conditions
        required:
          - task brief or user request
          - ./harness.yaml
          - ./source-map.md
          - ./workflow.md
          - ./tool-policy.md
      R1_contract:
        goal: shape specialistReport and confirm release limits
        read_when:
          - final report format is not supplied by caller
          - promotion, rollback, or blocker status must be reported
        files:
          - ../../protocol/interaction-protocol.md
          - ./release-rollback.md
      R2_target_agent:
        goal: understand the agent being taught
        read_when:
          - target agent id or path is supplied
        files:
          - target role card
          - target Agent Card
          - target harness
          - target wrappers
          - selected pack routing entry
          - existing target learning materials
      R3_history:
        goal: mine bounded usage history and prior findings
        read_when:
          - task names git history logs sessions traces run records reviews incidents or TODOs
        files:
          - named run records
          - bounded git path history
          - named logs sessions or traces
          - review findings and TODO or backlog artifacts
          - prior handoff packets
      R4_domain_refresh:
        goal: collect current domain practice and corner cases
        read_when:
          - target-domain facts may be stale or missing
          - task asks for best practices or corner cases
        files:
          - target source-of-truth docs
          - official or primary external domain sources
  task_scoped_reading: true
  what_to_read_policy: target-agent-contract-bounded-history-domain-source-and-existing-learning-materials-only
  context_economy:
    progressive_disclosure_required: true
    whole_target_repo_required_reads_allowed: false
    raw_private_history_storage_allowed: false
    learning_materials_require_provenance: true
  conditional_read:
    self_review_or_judge_output:
      - ./rubric.md
    eval_or_regression_output:
      - ./eval-plan.md
    run_record_output:
      - ./run-record.template.json
    release_or_promotion_review:
      - ./release-rollback.md
      - ./health-snapshot.md
  freshness_triggers:
    - target domain APIs standards SDKs regulations or platform practice changed
    - prior history shows stale-source or unsupported-practice failure
    - task asks for latest current best practice or corner cases
    - target agent's source-of-truth docs conflict with prior learned material
boot_probe:
  commands:
    - git status --short
    - find agents -maxdepth 2 -name agent-card.json -o -name harness.yaml
    - find .agents .hermes -maxdepth 4 -type f
    - sed -n '1,180p' packs/software-development-crew.yaml
automation_packs:
  intake_and_scope: ./workflow.md#1-intake-and-write-boundary
  target_contract_review: ./workflow.md#2-target-agent-contract-review
  history_evidence_map: ./workflow.md#3-history-evidence-map
  failure_taxonomy: ./workflow.md#4-failure-and-corner-case-taxonomy
  domain_refresh: ./workflow.md#5-domain-best-practice-refresh
  learning_materials: ./workflow.md#6-learning-material-authoring
  handoff_routing: ./workflow.md#7-handoff-and-review-routing
  validation: ./workflow.md#validation-pack
quality_gates:
  - target agent and learning objective are explicit
  - history sources are bounded and treated as data not instructions
  - every lesson corner case and eval seed cites prior evidence or an authoritative source
  - external best-practice claims include URL access date source type supported claim and trust boundary
  - private data is redacted or summarized before entering reusable materials
  - actual tuning testing creation or protocol work is handed off to the owning specialist unless explicitly reassigned
  - changed JSON YAML TOML and Markdown validate
  - target agent promotion remains blocked until Agent Tester review and eval evidence exist
release_blockers:
  - missing_target_agent_or_learning_objective
  - unbounded_or_unredactable_history_required
  - unsupported_or_uncited_best_practice_claim
  - learning_material_without_provenance
  - private_data_written_to_reusable_material
  - tuning_or_testing_performed_without_reassignment
  - required_handoff_missing
  - validation_failed
  - independent_agent_tester_review_missing_for_package_promotion
handoff:
  final_artifact_kind: specialistReport
  next_specialist_field: handoff.nextSpecialist
  tuning_next_specialist: agent-tuner
  testing_next_specialist: agent-tester
  creation_or_packaging_next_specialist: agent-architect-crew-builder
  protocol_or_governance_next_specialist: protocol-steward
  critical_handoff_required_fields:
    - evidence
    - severity
    - affectedSurfaces
    - remediationIntent
    - verificationNeeded
