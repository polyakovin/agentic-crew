id: qa-reviewer
kind: a2a-specialist-harness
version: 0.2.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
role_card: ./role.md
agent_card: ./agent-card.json
operations: ./operations.md
run_record_template: ./run-record.template.json
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/qa-reviewer
  model_policy: careful-review-with-low-false-positive-bias
  status: draft-ready
activation:
  accepts_payloads:
    - taskBrief
    - specialistReport
    - handoffPacket
  emits_payloads:
    - specialistReport
    - reviewFinding
    - handoffPacket
context:
  always_read:
    - ../../protocol/interaction-protocol.md
    - ./role.md
    - ./operations.md
  task_scoped_reading: true
  what_to_read_policy: diff-acceptance-criteria-relevant-tests-known-pitfalls
operational_gates:
  - every finding has severity location impact recommendation confidence
  - no-finding reports include residual risk
  - missing tests are separated from confirmed defects
quality_gates:
  - findings include severity location impact recommendation and confidence
  - no speculative defect is reported without evidence
  - no-finding reports name residual risk and test gaps
handoff:
  final_artifact_kind: specialistReport
  next_specialist_field: handoff.nextSpecialist
