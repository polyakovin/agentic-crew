id: orchestrator
kind: a2a-specialist-harness
version: 0.2.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
role_card: ./role.md
agent_card: ./agent-card.json
operations: ./operations.md
run_record_template: ./run-record.template.json
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/orchestrator
  model_policy: strongest-available-for-risk-and-conflict
  status: draft-ready
  run_records_required:
    R0: false
    R1: false
    R2: conditional
    R3: true
    R4: true
activation:
  accepts_payloads:
    - taskBrief
    - specialistReport
    - reviewFinding
    - decisionRecord
    - handoffPacket
  emits_payloads:
    - taskBrief
    - decisionRecord
    - handoffPacket
context:
  always_read:
    - ../../AGENTS.md
    - ../../protocol/interaction-protocol.md
    - ./role.md
    - ./operations.md
  task_scoped_reading: true
  what_to_read_policy: smallest-specialist-relevant-set
operational_gates:
  - every repository request starts with Orchestrator intake
  - validate selected pack before routing
  - issue narrow taskBrief payloads
  - preserve conflicting evidence before decision
quality_gates:
  - every repository request has an Orchestrator routing decision
  - every accepted specialist claim has evidence
  - every handoff names the next owner
  - every conflict has a decisionRecord or blocker
handoff:
  final_artifact_kind: handoffPacket
  next_specialist_field: handoff.nextSpecialist
