id: system-architect
kind: a2a-specialist-harness
version: 0.2.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
role_card: ./role.md
agent_card: ./agent-card.json
operations: ./operations.md
run_record_template: ./run-record.template.json
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/system-architect
  model_policy: strong-reasoning-for-boundaries-and-tradeoffs
  status: draft-ready
activation:
  accepts_payloads:
    - taskBrief
  emits_payloads:
    - specialistReport
    - decisionRecord
    - handoffPacket
context:
  always_read:
    - ../../protocol/interaction-protocol.md
    - ./role.md
    - ./operations.md
  task_scoped_reading: true
  what_to_read_policy: architecture-docs-manifests-and-touched-contracts
operational_gates:
  - component ownership must be named
  - rollback and verification must be named for non-trivial changes
  - shared-state/schema risks must be explicit
quality_gates:
  - changed boundaries have an owner
  - design recommendation names rollback and verification
  - shared-state or schema risk is explicitly called out
handoff:
  final_artifact_kind: decisionRecord
  next_specialist_field: handoff.nextSpecialist
