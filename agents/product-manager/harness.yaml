id: product-manager
kind: a2a-specialist-harness
version: 0.2.0
protocol: ../../protocol/interaction-protocol.md
payload_schema: ../../protocol/message-schema.json
role_card: ./role.md
agent_card: ./agent-card.json
operations: ./operations.md
run_record_template: ./run-record.template.json
runtime:
  transport: A2A JSON-RPC
  endpoint_placeholder: https://example.invalid/a2a/product-manager
  model_policy: product-reasoning-with-good-instruction-following
  status: draft-ready
activation:
  accepts_payloads:
    - taskBrief
  emits_payloads:
    - specialistReport
    - handoffPacket
context:
  always_read:
    - ../../protocol/interaction-protocol.md
    - ./role.md
    - ./operations.md
  task_scoped_reading: true
  what_to_read_policy: product-specs-and-user-facing-docs-only
operational_gates:
  - acceptance criteria must be testable
  - non-goals must be explicit
  - technical assumptions must be labeled
quality_gates:
  - acceptance criteria are testable
  - scope and non-goals are explicit
  - technical assumptions are labeled as assumptions
handoff:
  final_artifact_kind: specialistReport
  next_specialist_field: handoff.nextSpecialist
