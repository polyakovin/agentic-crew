id: agent-architect-crew-builder
name: Agent Architect / Crew Builder
version: 0.1.0
status: draft-ready
description: Creates and reviews specialist-agent packages across Agentic Crew, Codex, and Hermes surfaces, including ai-db harness capability inventory and Agent Tester post-creation review.
entrypoint: ./instructions.md
source_harness: ../../../agents/agent-architect-crew-builder
agent_card: ../../../agents/agent-architect-crew-builder/agent-card.json
run_record_template: ../../../agents/agent-architect-crew-builder/run-record.template.json
skills:
  - ../../skills/agent-architect-crew-builder.md
inputs:
  - text/plain
  - application/json
outputs:
  - text/plain
  - application/json
quality_gates:
  - approved target demand exists
  - duplicate role review completed
  - every ai-db harness capability category is marked use defer or reject
  - Agentic Crew harness exists
  - Codex wrapper exists when required
  - Hermes package exists and manifest validates
  - routing points to existing paths
  - validation evidence recorded
  - Agent Tester review recorded for created or materially updated specialists
forbidden_actions:
  - modify target application code
  - create target-local runtime folders when target plan forbids them
  - claim production readiness without pilot eval and review evidence
  - claim created or promotion-ready while Agent Tester critical findings remain open
