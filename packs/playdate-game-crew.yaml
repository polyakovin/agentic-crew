name: playdate-game-crew
version: 0.2.0
description: Playdate-focused game-development crew with SDK/platform specialist.
protocol: ../protocol/interaction-protocol.md
extends: software-development-crew
agents:
  - id: orchestrator
    path: ../agents/orchestrator
    harness: ../agents/orchestrator/harness.yaml
    required: true
  - id: product-manager
    path: ../agents/product-manager
    harness: ../agents/product-manager/harness.yaml
    required: false
  - id: system-architect
    path: ../agents/system-architect
    harness: ../agents/system-architect/harness.yaml
    required: false
  - id: implementation-engineer
    path: ../agents/implementation-engineer
    harness: ../agents/implementation-engineer/harness.yaml
    required: false
  - id: qa-reviewer
    path: ../agents/qa-reviewer
    harness: ../agents/qa-reviewer/harness.yaml
    required: false
  - id: playdate-platform-sdk
    path: ../agents/playdate-platform-sdk
    harness: ../agents/playdate-platform-sdk/harness.yaml
    required: false
  - id: protocol-steward
    path: ../agents/protocol-steward
    harness: ../agents/protocol-steward/harness.yaml
    required: false
routing:
  playdate-sdk-api: playdate-platform-sdk
  crank-buttons-accelerometer: playdate-platform-sdk
  datastore-save: playdate-platform-sdk
  simulator-device-difference: playdate-platform-sdk
  graphics-draw-mode: playdate-platform-sdk
  performance: playdate-platform-sdk
  requirements: product-manager
  architecture: system-architect
  implementation: implementation-engineer
  review: qa-reviewer
  conflict-resolution: orchestrator
