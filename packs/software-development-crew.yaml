name: software-development-crew
version: 0.2.0
description: General software-development crew inspired by software-company multi-agent patterns.
protocol: ../protocol/interaction-protocol.md
entrypoint: direct
routing_policy: direct-by-default
agents:
  - id: orchestrator
    path: ../agents/orchestrator
    harness: ../agents/orchestrator/harness.yaml
    required: false
  - id: product-manager
    path: ../agents/product-manager
    harness: ../agents/product-manager/harness.yaml
    required: false
  - id: system-architect
    path: ../agents/system-architect
    harness: ../agents/system-architect/harness.yaml
    required: false
  - id: spec-contract-guardian
    path: ../agents/spec-contract-guardian
    harness: ../agents/spec-contract-guardian/harness.yaml
    required: false
  - id: implementation-engineer
    path: ../agents/implementation-engineer
    harness: ../agents/implementation-engineer/harness.yaml
    required: false
  - id: qa-reviewer
    path: ../agents/qa-reviewer
    harness: ../agents/qa-reviewer/harness.yaml
    required: false
  - id: protocol-steward
    path: ../agents/protocol-steward
    harness: ../agents/protocol-steward/harness.yaml
    required: false
  - id: agent-architect-crew-builder
    path: ../agents/agent-architect-crew-builder
    harness: ../agents/agent-architect-crew-builder/harness.yaml
    required: false
  - id: agent-tester
    path: ../agents/agent-tester
    harness: ../agents/agent-tester/harness.yaml
    required: false
  - id: agent-teacher
    path: ../agents/agent-teacher
    harness: ../agents/agent-teacher/harness.yaml
    required: false
  - id: agent-tuner
    path: ../agents/agent-tuner
    harness: ../agents/agent-tuner/harness.yaml
    required: false
routing:
  requirements: product-manager
  architecture: system-architect
  spec-drift: spec-contract-guardian
  contract-audit: spec-contract-guardian
  manifest-code-drift: spec-contract-guardian
  api-contracts: spec-contract-guardian
  pure-logic-boundaries: spec-contract-guardian
  implementation: implementation-engineer
  review: qa-reviewer
  role-authoring: protocol-steward
  agent-authoring: agent-architect-crew-builder
  harness-creation: agent-architect-crew-builder
  specialist-packaging: agent-architect-crew-builder
  codex-wrapper: agent-architect-crew-builder
  hermes-package: agent-architect-crew-builder
  agent-testing: agent-tester
  agent-evaluation: agent-tester
  agent-red-team: agent-tester
  agent-exploratory-testing: agent-tester
  agent-knowledge-base-learning: agent-tester
  agent-teaching: agent-teacher
  agent-learning-enrichment: agent-teacher
  agent-history-learning: agent-teacher
  agent-corner-case-enrichment: agent-teacher
  agent-tuning: agent-tuner
  agent-refinement: agent-tuner
  agent-overlap-reduction: agent-tuner
  agent-prompt-refinement: agent-tuner
  agent-eval-seed-refinement: agent-tuner
  conflict-resolution: orchestrator
